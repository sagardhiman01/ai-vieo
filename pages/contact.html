<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | VISION AI</title>
    <meta name="description" content="Start a project. India-rooted. Global-minded.">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #f5f1e6; --accent: #e6c35c; --text-dark: #1a1a1a; --text-light: #5a5a5a;
            --serif: 'Playfair Display', serif; --sans: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-dark); font-family: var(--sans); cursor: none; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* CURSOR */
        .cursor-dot, .cursor-outline { position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 9999; pointer-events: none; }
        .cursor-dot { width: 8px; height: 8px; background-color: var(--accent); }
        .cursor-outline { width: 40px; height: 40px; border: 1px solid var(--accent); transition: width 0.3s, height 0.3s, background-color 0.3s; }
        .hovering .cursor-outline { width: 60px; height: 60px; background-color: rgba(230, 195, 92, 0.2); border-color: transparent; }

        /* NAV */
        nav { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1200px;
            background: rgba(245, 241, 230, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(230, 195, 92, 0.3); border-radius: 50px;
            display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .logo { font-family: var(--serif); font-size: 1.8rem; font-weight: 700; text-decoration: none; color: var(--text-dark); }
        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a { font-size: 0.85rem; text-decoration: none; color: var(--text-dark); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; position: relative;}
        .nav-links a::after { content: ''; position: absolute; width: 0; height: 1px; bottom: -4px; left: 0; background-color: var(--accent); transition: width 0.3s ease; }
        .nav-links a:hover::after { width: 100%; }

        /* CONTACT LAYOUT */
        .contact-container { padding: 200px 5% 100px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .contact-header h1 { font-family: var(--serif); font-size: clamp(3rem, 6vw, 5rem); line-height: 1.1; margin-bottom: 30px; opacity: 0; transform: translateY(30px);}
        .contact-header p { font-size: 1.1rem; color: var(--text-light); line-height: 1.8; margin-bottom: 50px; opacity: 0; transform: translateY(30px);}
        
        .contact-info { display: flex; flex-direction: column; gap: 30px; opacity: 0; transform: translateY(30px);}
        .info-block h4 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px;}
        .info-block p { font-family: var(--serif); font-size: 1.5rem; }

        .contact-form { background: rgba(255, 255, 255, 0.4); padding: 50px; border-radius: 20px; border: 1px solid rgba(230, 195, 92, 0.2); opacity: 0; transform: translateY(30px);}
        .form-group { margin-bottom: 30px; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px 0; background: transparent; border: none; border-bottom: 1px solid rgba(26,26,26,0.2); font-family: var(--sans); font-size: 1rem; color: var(--text-dark); outline: none; transition: border-color 0.3s; cursor: none;}
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
        .form-group textarea { resize: vertical; min-height: 100px; }
        
        .btn-submit {
            display: inline-block; padding: 20px 50px; background-color: var(--text-dark); color: var(--bg); border: none;
            font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 500; border-radius: 50px;
            cursor: none; position: relative; overflow: hidden; transition: all 0.4s ease; font-family: var(--sans);
        }
        .btn-submit::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--accent); transform: scaleY(0); transform-origin: bottom; transition: transform 0.4s ease; z-index: -1; }
        .btn-submit:hover { color: var(--text-dark); }
        .btn-submit:hover::before { transform: scaleY(1); }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .contact-container { grid-template-columns: 1fr; gap: 50px; }
            .contact-form { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="cursor-dot"></div><div class="cursor-outline"></div>

    <nav class="nav-bar">
        <a href="../index.html" class="logo">gaa-tha</a>
        <ul class="nav-links">
            <li><a href="services.html" class="hover-target">Services</a></li>
            <li><a href="portfolio.html" class="hover-target">Work</a></li>
            <li><a href="about.html" class="hover-target">About Us</a></li>
            <li><a href="contact.html" class="hover-target" style="color: var(--accent); border-bottom: 1px solid var(--accent);">Initialize Project</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <div class="contact-header">
            <h1 class="fade-up">Let's craft<br>your story.</h1>
            <p class="fade-up">Whether you're looking to redefine your brand's visual logic or need high-end cinematic generation, our collective is ready.</p>
            <div class="contact-info fade-up">
                <div class="info-block">
                    <h4>Email Us</h4>
                    <p>hello@visionai.studio</p>
                </div>
                <div class="info-block">
                    <h4>Visit Us</h4>
                    <p>India-rooted.<br>Global-minded.</p>
                </div>
            </div>
        </div>
        
        <div class="contact-form fade-up">
            <form onsubmit="event.preventDefault(); alert('Message Received. Form submission dummy.');">
                <div class="form-group"><input type="text" placeholder="Your Name" class="hover-target" required></div>
                <div class="form-group"><input type="email" placeholder="Your Email" class="hover-target" required></div>
                <div class="form-group"><input type="text" placeholder="Company/Brand" class="hover-target"></div>
                <div class="form-group"><textarea placeholder="Tell us about your project..." class="hover-target" required></textarea></div>
                <button type="submit" class="btn-submit hover-target" style="z-index: 2;">Send Message</button>
            </form>
        </div>
    </div>

    <script>
        // CURSOR
        const cursorDot = document.querySelector('.cursor-dot'), cursorOutline = document.querySelector('.cursor-outline');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2, outlineX = mouseX, outlineY = mouseY;
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; cursorDot.style.left = mouseX + 'px'; cursorDot.style.top = mouseY + 'px'; });
        function animateCursor() { outlineX += (mouseX - outlineX) * 0.15; outlineY += (mouseY - outlineY) * 0.15; cursorOutline.style.left = outlineX + 'px'; cursorOutline.style.top = outlineY + 'px'; requestAnimationFrame(animateCursor); }
        animateCursor();
        document.querySelectorAll('.hover-target, button, input, textarea, a').forEach(el => { el.addEventListener('mouseenter', () => document.body.classList.add('hovering')); el.addEventListener('mouseleave', () => document.body.classList.remove('hovering')); });

        // REVEALS
        gsap.to('.fade-up', { y: 0, opacity: 1, duration: 1, stagger: 0.2, ease: "power3.out", delay: 0.2 });
    </script>
    <script src="../js/cms.js"></script>
</body>
</html>
